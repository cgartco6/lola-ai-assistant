<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lola – My Slegte AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="chat">
        <h1>🍑 Lola</h1>
        <div id="messages"></div>
        <div id="speedDisplay" style="color: #ff99cc; margin-bottom: 10px;"></div>
        <div style="display:flex; gap:5px; align-items:center;">
            <input id="input" placeholder="Praat met my, skat..." />
            <button onclick="send()">Stuur</button>
            <button id="micButton" style="background: #993366; padding: 10px 15px;">🎤</button>
        </div>
        <audio id="audioPlayer" controls style="width:100%; margin-top:10px;"></audio>
    </div>
    <script>
        const ws = new WebSocket("ws://" + window.location.host + "/ws");
        const messages = document.getElementById("messages");
        const input = document.getElementById("input");
        const audioPlayer = document.getElementById("audioPlayer");
        const speedDisplay = document.getElementById("speedDisplay");

        // Speech Recognition (voice input)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'af-ZA'; // can be changed
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                input.value = transcript;
                send();
            };
            recognition.onerror = function(event) {
                console.error("Voice error", event);
            };
            document.getElementById("micButton").addEventListener("click", function() {
                recognition.start();
            });
        } else {
            document.getElementById("micButton").style.display = "none";
        }

        ws.onmessage = function(e) {
            const data = JSON.parse(e.data);
            const p = document.createElement("p");
            p.textContent = "Lola: " + data.reply;
            messages.appendChild(p);
            messages.scrollTop = messages.scrollHeight;
            if (data.audio) {
                audioPlayer.src = data.audio;
                audioPlayer.play();
            }
            if (data.speed_alert) {
                speedDisplay.textContent = "🚦 " + data.speed_alert;
            }
        };

        function send() {
            const msg = input.value.trim();
            if (!msg) return;
            const p = document.createElement("p");
            p.textContent = "Jy: " + msg;
            p.style.textAlign = "right";
            p.style.borderLeft = "none";
            p.style.borderRight = "4px solid #ff99cc";
            messages.appendChild(p);
            ws.send(JSON.stringify({ msg: msg }));
            input.value = "";
            // Send GPS + speed
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    // Estimate speed from position change? We'll just send speed from device if available
                    const speed = pos.coords.speed ? pos.coords.speed * 3.6 : 0; // m/s to km/h
                    ws.send(JSON.stringify({
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        speed: speed
                    }));
                });
            }
        }

        input.addEventListener("keypress", function(e) {
            if (e.key === "Enter") send();
        });

        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const speed = pos.coords.speed ? pos.coords.speed * 3.6 : 0;
                    ws.send(JSON.stringify({
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        speed: speed
                    }));
                });
            }
        };
    </script>
</body>
</html>
